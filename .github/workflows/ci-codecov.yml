name: CI with Codecov

on:
  pull_request:
  push:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 11.5.0

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Get playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache playwright binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install playwright system dependencies
        timeout-minutes: 5
        run: pnpm exec playwright install-deps chromium

      - name: Install playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: |
          # Heartbeat to prevent GitHub Actions from killing the step due to no output during extraction
          while true; do echo "$(date '+%H:%M:%S') still installing..."; sleep 30; done &
          HEARTBEAT_PID=$!
          pnpm exec playwright install chromium
          kill $HEARTBEAT_PID 2>/dev/null || true

      - name: Run tests
        run: pnpm test:ci --coverage.enabled
  
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          directory: ./coverage
          fail_ci_if_error: true
          flags: lingshu-toolkit#unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
